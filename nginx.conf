server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Hashed asset files are immutable — cache them hard.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: every non-file route serves index.html so client-side
    # routing (react-router) handles it.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Liveness/readiness target for k8s (cheap 200, no SPA fallback).
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Don't cache the HTML entrypoint so new deploys are picked up immediately.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
